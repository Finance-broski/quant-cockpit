<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quant Cockpit</title>
    <meta name="application-name" content="Quant Cockpit" />
    <meta name="theme-color" content="#04060c" />
    <link rel="icon" type="image/svg+xml" href="/cockpit.svg" />
    <link rel="apple-touch-icon" href="/cockpit.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { font-size: 14px; }

      body {
        background: #0a0a0f;
        color: #e2e8f0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a { color: inherit; text-decoration: none; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #0a0a0f; }
      ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3b3b55; }

      /* Number spinner */
      input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }

      /* Date picker dark */
      input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

      /* Remove outline; rely on border-color change on focus */
      input:focus, select:focus, textarea:focus, button:focus { outline: none; }
      input:focus, select:focus, textarea:focus { border-color: #3b82f6 !important; }

      /* Button micro-interaction */
      button { transition: opacity 0.15s, transform 0.1s, background 0.15s, border-color 0.15s; }
      button:active:not(:disabled) { transform: scale(0.97); }

      /* Tabular numbers */
      .mono { font-variant-numeric: tabular-nums; }

      /* Skeleton loader */
      @keyframes skel {
        0%, 100% { opacity: 0.35; }
        50%       { opacity: 0.65; }
      }
      .skeleton { background: #1e1e2e; border-radius: 4px; animation: skel 1.4s ease-in-out infinite; }

      /* Price flash */
      @keyframes flash-up   { 0%,100%{background:transparent} 40%{background:#00d4aa1a} }
      @keyframes flash-down { 0%,100%{background:transparent} 40%{background:#ff47571a} }
      .flash-up   { animation: flash-up   0.6s ease; }
      .flash-down { animation: flash-down 0.6s ease; }

      /* Ticker marquee */
      @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      .marquee-inner { display: flex; animation: marquee 50s linear infinite; white-space: nowrap; }
      .marquee-inner:hover { animation-play-state: paused; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
